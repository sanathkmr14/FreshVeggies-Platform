{% extends 'base.html' %}
{% load static %}
{% block title %}Password Reset Sent{% endblock title %}

{% block main-content %}
<div class="container py-5 mt-3 mb-5">
  <div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">
      <div class="card shadow-sm border-0 text-center"
        style="border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05) !important;">
        <div class="card-body p-5">
          <div class="icon-circle mx-auto mb-4"
            style="width: 80px; height: 80px; background: #e6f2ec; color: #2d6a4f; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 2.5rem;">
            <i class="fas fa-paper-plane"></i>
          </div>
          <h3 class="fw-bold mb-3 text-success">Check Your Email</h3>
          <p class="text-muted mb-5" style="font-size: 1.1rem; line-height: 1.6;">We've sent an email with instructions
            to reset your password. Please check your inbox and spam folder.</p>
          <a href="{% url 'login' %}" class="btn btn-outline-success px-5 py-3"
            style="border-radius: 50px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px;">Return to
            Login</a>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock main-content %}
